name: Update Crypto News

on:
  schedule:
    # Run every hour at minute 5
    - cron: '5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-news:
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
      
      - name: Run news scraper
        run: |
          cd scripts
          python scrape.py
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/aggregated_news.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/aggregated_news.json
          git commit -m "🤖 Update crypto news - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
      
      - name: Trigger Netlify build (optional)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          # Trigger Netlify build webhook if you have one
          # curl -X POST -d {} YOUR_NETLIFY_BUILD_HOOK_URL
          echo "News updated, Netlify will auto-deploy"
