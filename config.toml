baseURL = "https://blockwirenews.com/"
languageCode = "en-us"
title = "BlockwireNews - Real-Time Cryptocurrency News Aggregator"
theme = ""
paginate = 20
enableRobotsTXT = true
enableGitInfo = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[params]
  description = "Get real-time cryptocurrency news, market analysis, and price predictions. BlockwireNews aggregates top crypto news from leading sources. Bitcoin, Ethereum, DeFi, NFT updates 24/7."
  keywords = "cryptocurrency news, bitcoin news, ethereum updates, crypto market analysis, blockchain news, defi news, nft news, crypto price predictions"
  author = "BlockwireNews"
  ogImage = "/og-image.jpg"
  twitterHandle = "@blockwirenews"
  
  # Google AdSense
  adsensePublisherId = "ca-pub-XXXXXXXXXXXXXXXX"
  
  # Analytics
  googleAnalytics = "UA-XXXXXXXXX-X"
  
  # Social Links
  twitter = "https://twitter.com/blockwirenews"
  telegram = "https://t.me/blockwirenews"
  youtube = "https://youtube.com/blockwirenews"
  email = "contact@blockwirenews.com"

[menu]
  [[menu.main]]
    identifier = "bitcoin"
    name = "Bitcoin"
    url = "/bitcoin/"
    weight = 1
    
  [[menu.main]]
    identifier = "ethereum"
    name = "Ethereum"
    url = "/ethereum/"
    weight = 2
    
  [[menu.main]]
    identifier = "defi"
    name = "DeFi"
    url = "/defi/"
    weight = 3
    
  [[menu.main]]
    identifier = "nft"
    name = "NFTs"
    url = "/nft/"
    weight = 4
    
  [[menu.main]]
    identifier = "analysis"
    name = "Analysis"
    url = "/analysis/"
    weight = 5
    
  [[menu.main]]
    identifier = "learn"
    name = "Learn"
    url = "/learn/"
    weight = 6

[taxonomies]
  category = "categories"
  tag = "tags"
  source = "sources"

[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "monokai"
    tabWidth = 4

[services]
  [services.googleAnalytics]
    ID = "UA-XXXXXXXXX-X"

[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    respectDoNotTrack = true

[permalinks]
  news = "/news/:year/:month/:slug/"
  bitcoin = "/bitcoin/:slug/"
  ethereum = "/ethereum/:slug/"
  defi = "/defi/:slug/"
  nft = "/nft/:slug/"
  analysis = "/analysis/:slug/"
  learn = "/learn/:slug/"