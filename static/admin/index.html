<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockwireNews Admin</title>
    
    <!-- Include the styles for the Netlify CMS UI -->
    <link href="https://unpkg.com/netlify-cms@^2.0.0/dist/cms.css" rel="stylesheet" />
    
    <!-- Custom admin styles -->
    <style>
        /* Custom retro theme for the admin */
        body {
            font-family: 'Space Mono', monospace;
        }
        
        .nc-githubAuthenticationPage-logo {
            background-color: #FF6B35;
            border-radius: 12px;
            padding: 20px;
        }
        
        .nc-githubAuthenticationPage-button {
            background: linear-gradient(45deg, #9D4EDD, #FF006E);
            border: none;
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.4);
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .nc-githubAuthenticationPage-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.6);
        }
    </style>
</head>
<body>
    <!-- Include the script that builds the page and powers Netlify CMS -->
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
    
    <!-- Custom preview styles -->
    <script>
        CMS.registerPreviewStyle("/css/main.css");
        
        // Custom preview template for news articles
        var NewsPreview = createClass({
            render: function() {
                var entry = this.props.entry;
                var image = entry.getIn(['data', 'image']);
                var bg = image ? h('div', {
                    style: {
                        backgroundImage: 'url(' + image + ')',
                        height: '300px',
                        backgroundSize: 'cover',
                        backgroundPosition: 'center',
                        marginBottom: '2rem'
                    }
                }) : '';
                
                return h('div', {"className": "news-container"},
                    h('article', {"className": "news-card", style: {maxWidth: '800px', margin: '0 auto'}},
                        bg,
                        h('div', {"className": "card-content"},
                            h('div', {"className": "card-meta"},
                                h('span', {"className": "source-badge"}, entry.getIn(['data', 'source'], 'BlockwireNews')),
                                h('time', {}, entry.getIn(['data', 'date'], new Date()).toString())
                            ),
                            h('h1', {"className": "card-title"}, entry.getIn(['data', 'title'], '')),
                            h('div', {"className": "card-tags"},
                                (entry.getIn(['data', 'tags'], []) || []).map(function(tag) {
                                    return h('span', {"className": "tag", key: tag}, tag);
                                })
                            ),
                            h('div', {"className": "content", "dangerouslySetInnerHTML": {__html: this.props.widgetFor('body').props.value}})
                        )
                    )
                );
            }
        });
        
        CMS.registerPreviewTemplate("news", NewsPreview);
        CMS.registerPreviewTemplate("bitcoin", NewsPreview);
        CMS.registerPreviewTemplate("ethereum", NewsPreview);
        CMS.registerPreviewTemplate("defi", NewsPreview);
        CMS.registerPreviewTemplate("analysis", NewsPreview);
    </script>
</body>
</html>
